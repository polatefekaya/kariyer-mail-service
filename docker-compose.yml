version: '3.8'

services:
  # ==========================================
  # 1. MICROSOFT GARNET (HIGH-PERFORMANCE CACHE)
  # ==========================================
  garnet:
    image: ghcr.io/microsoft/garnet:latest
    container_name: kariyer-garnet
    restart: unless-stopped
    ports:
      - "6380:6379" # Maps Host 6380 to Container 6379
    volumes:
      - garnet_data:/data
    command: ["--aof"]

  # ==========================================
  # 2. .NET 10 MAIL MICROSERVICE
  # ==========================================
  mail-api:
    build:
      context: .
      dockerfile: src/Kariyer.Mail.Api/Dockerfile
      args:
        GITHUB_USER: ${GITHUB_USER}
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: kariyer-mail-api
    network_mode: host # Crucial so it can find your bare-metal Postgres & RabbitMQ on 127.0.0.1
    restart: unless-stopped
    depends_on:
      - garnet
    env_file:
      - .env

volumes:
  garnet_data: