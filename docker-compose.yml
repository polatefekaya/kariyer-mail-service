services:
  mail-api:
    image: kariyer-mail-api:latest
    build:
      context: .
      dockerfile: src/Kariyer.Mail.Api/Dockerfile
    container_name: kariyer-mail-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: mail-db
    environment:
      POSTGRES_USER: mail_service_user
      POSTGRES_PASSWORD: LocalDevPassword123!
      POSTGRES_DB: kariyer_mail_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mail_service_user -d kariyer_mail_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mail-mq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  garnet:
    image: microsoft/garnet
    container_name: mail-cache
    ports:
      - "6379:6379"